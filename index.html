<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="author" content="Levi Gartner"/>
  <link rel="icon" type="image/svg+xml" href="Webicon.svg"/>
  <title>Genres of Australia 1954-2024</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="app.js" defer></script>
  <link rel="stylesheet" href="https://use.typekit.net/jrx8vqr.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flag-icons@7.2.3/css/flag-icons.min.css"/>
  <link rel="stylesheet" href="reset.css"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div class="page-wrapper">
    <header class="main-header">
      <div class="header-content">
        <img src="genresofaustralialogo2026.svg" alt="Genres of Australia" class="logo-image" />
        <div class="taxonomy-bar taxonomy-bar-header"></div>
      </div>
    </header>
    <div class="header-divider"></div>

    <div class="main-container">
      <div class="chart-area">
        <div class="chart-wrapper">
          <div class="chart-container">
            <div class="sort-controls">
              <div class="chart-controls-row">
                <div id="chart-sort-control"></div>
                <span id="song-info">
                  <button id="toggle-all-global">Hide all</button>
                  <span id="song-count"></span>
                  <span id="chart-transport">
                    <button id="prev-first" title="Previous song" aria-label="Previous song"><span class="play-icon"></span></button>
                    <button id="play-first" title="Play video" aria-label="Play video"><span class="play-icon"></span></button>
                    <button id="next-first" title="Next song" aria-label="Next song"><span class="play-icon"></span></button>
                  </span>
                </span>
              </div>
              <div id="chart-rank-header" class="chart-rank-header" aria-label="Chart rank headers"></div>
            </div>
          </div>
        </div>
      </div>

      <div class="context-column">
        <div class="context-cell" id="song-modal-cell" style="display:none;"></div>
        <div class="context-cell" id="info-cell"></div>
        <div class="context-cell" id="genres-cell"></div>
        <div class="context-cell" id="countries-cell"></div>
        <div class="context-cell" id="artists-cell"></div>
        <div class="context-cell" id="about-cell"></div>
        <div class="context-credit">Created by <a href="https://levigartner.myportfolio.com/" target="_blank" rel="noopener noreferrer">Levi Gartner</a></div>
      </div>
    </div>
  </div>

</body>
</html>
